<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<template id="__bundler_thumbnail" data-bg-color="#F2EADB">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#F2EADB"/>
    <circle cx="556" cy="400" r="92" fill="none" stroke="#D9B968" stroke-width="20"/>
    <circle cx="644" cy="400" r="92" fill="none" stroke="#C9A24B" stroke-width="20"/>
    <text x="600" y="640" font-family="Georgia, 'DM Serif Display', serif" font-size="76" fill="#3A352F" text-anchor="middle">Phillip &amp; Verena</text>
  </svg>
</template>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#ECE3D4;}
  *{box-sizing:border-box;}
</style>
</helmet>

<div style="min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#F2EADB,#E6DAC6);font-family:'Karla',sans-serif;display:flex;align-items:center;justify-content:center;padding:44px 20px;">

  <div style="width:362px;height:768px;background:#1c1a16;border-radius:52px;padding:11px;box-shadow:0 36px 70px rgba(60,48,30,.30);flex:none;">
    <div style="position:relative;width:100%;height:100%;border-radius:42px;overflow:hidden;background:#FBF5EA;">

      <!-- notch -->
      <div style="position:absolute;left:50%;top:0;transform:translateX(-50%);width:128px;height:28px;background:#1c1a16;border-radius:0 0 18px 18px;z-index:60;"></div>

      <!-- faint corner ornaments -->
      <div style="position:absolute;left:22px;top:54px;width:34px;height:34px;border-left:1.5px solid #DBCBA6;border-top:1.5px solid #DBCBA6;border-radius:5px 0 0 0;"></div>
      <div style="position:absolute;right:22px;top:54px;width:34px;height:34px;border-right:1.5px solid #DBCBA6;border-top:1.5px solid #DBCBA6;border-radius:0 5px 0 0;"></div>

      <div style="position:absolute;inset:0;padding:62px 30px 28px;display:flex;flex-direction:column;align-items:center;">

        <!-- eyebrow -->
        <div style="font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#C9A24B;font-weight:700;">Ein Hochzeits-Dash</div>

        <!-- title -->
        <h1 style="font-family:'DM Serif Display',serif;font-weight:400;font-size:40px;line-height:1.08;color:#3A352F;margin:14px 0 0;text-align:center;">Phillip <span style="font-style:italic;color:#C9A24B;">&amp;</span> Verena</h1>

        <!-- rule -->
        <div style="width:58px;height:1px;background:#C9A24B;margin:18px 0 14px;"></div>

        <!-- subtitle -->
        <div style="font-style:italic;font-size:14.5px;color:#8C8377;text-align:center;">Kein Hindernis hält sie auf</div>

        <!-- interlocking rings motif -->
        <sc-if value="{{ ringMotif }}" hint-placeholder-val="{{ true }}">
          <div style="position:relative;width:54px;height:30px;margin:22px 0 4px;">
            <div style="position:absolute;left:0;top:2px;width:26px;height:26px;border:2.5px solid #D9B968;border-radius:50%;"></div>
            <div style="position:absolute;left:18px;top:2px;width:26px;height:26px;border:2.5px solid #C9A24B;border-radius:50%;"></div>
          </div>
        </sc-if>

        <!-- choose label -->
        <div style="font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#A89E8E;font-weight:700;margin-top:26px;">Wähle deinen Character</div>

        <!-- character cards -->
        <div style="display:flex;gap:22px;margin-top:18px;">

          <!-- Verena -->
          <div onClick="{{ selectVerena }}" style="cursor:pointer;text-align:center;width:128px;" style-hover="transform:translateY(-3px);">
            <div style="position:relative;width:118px;height:118px;margin:0 auto;">
              <div style="position:absolute;inset:0;border-radius:50%;border:1.5px solid #E2D4B4;background:#FFFDF8;overflow:hidden;box-shadow:0 10px 22px rgba(150,120,60,.14);">
                <div style="position:absolute;left:50%;top:20px;transform:translateX(-50%) scale(.66);transform-origin:top center;"><dc-import name="Verena" hint-size="140px,178px"></dc-import></div>
              </div>
              <sc-if value="{{ selVerena }}" hint-placeholder-val="{{ false }}">
                <div style="position:absolute;left:-6px;top:-6px;right:-6px;bottom:-6px;border-radius:50%;border:2.5px solid #C9A24B;box-shadow:0 0 0 4px rgba(201,162,75,.16);"></div>
              </sc-if>
            </div>
            <div style="font-family:'DM Serif Display',serif;font-size:21px;color:#3A352F;margin-top:14px;">Verena</div>
            <div style="font-style:italic;font-size:12.5px;color:#A0978A;margin-top:1px;">Braut</div>
          </div>

          <!-- Phillip -->
          <div onClick="{{ selectPhillip }}" style="cursor:pointer;text-align:center;width:128px;" style-hover="transform:translateY(-3px);">
            <div style="position:relative;width:118px;height:118px;margin:0 auto;">
              <div style="position:absolute;inset:0;border-radius:50%;border:1.5px solid #E2D4B4;background:#FFFDF8;overflow:hidden;box-shadow:0 10px 22px rgba(150,120,60,.14);">
                <div style="position:absolute;left:50%;top:20px;transform:translateX(-50%) scale(.66);transform-origin:top center;"><dc-import name="Phillip" hint-size="140px,180px"></dc-import></div>
              </div>
              <sc-if value="{{ selPhillip }}" hint-placeholder-val="{{ false }}">
                <div style="position:absolute;left:-6px;top:-6px;right:-6px;bottom:-6px;border-radius:50%;border:2.5px solid #C9A24B;box-shadow:0 0 0 4px rgba(201,162,75,.16);"></div>
              </sc-if>
            </div>
            <div style="font-family:'DM Serif Display',serif;font-size:21px;color:#3A352F;margin-top:14px;">Phillip</div>
            <div style="font-style:italic;font-size:12.5px;color:#A0978A;margin-top:1px;">Bräutigam</div>
          </div>

        </div>

        <!-- hint -->
        <sc-if value="{{ showHint }}" hint-placeholder-val="{{ true }}">
          <div style="margin-top:30px;display:flex;align-items:center;gap:9px;border-top:1px dashed #E0D3B6;border-bottom:1px dashed #E0D3B6;padding:11px 4px;width:100%;justify-content:center;">
            <div style="position:relative;width:13px;height:14px;flex:none;">
              <div style="position:absolute;left:1.5px;top:0;width:10px;height:6px;background:#C9A24B;clip-path:polygon(50% 0,100% 100%,0 100%);"></div>
              <div style="position:absolute;left:1.5px;top:7px;width:10px;height:6px;background:#D9B968;clip-path:polygon(50% 0,100% 100%,0 100%);"></div>
            </div>
            <div style="font-size:12px;color:#8C8377;text-align:center;line-height:1.4;">Tippe zum Springen · <span style="color:#6B6358;">nochmal tippen für einen Doppelsprung</span></div>
          </div>
        </sc-if>

        <!-- Bestenliste secondary CTA -->
        <div style="cursor:pointer;margin-top:24px;display:inline-flex;align-items:center;gap:9px;padding:11px 24px;border:1.5px solid #C9A24B;border-radius:30px;color:#3A352F;background:transparent;" style-hover="background:rgba(201,162,75,.10);">
          <div style="display:flex;align-items:flex-end;gap:2.5px;height:14px;">
            <div style="width:3px;height:8px;background:#C9A24B;border-radius:1px;"></div>
            <div style="width:3px;height:14px;background:#C9A24B;border-radius:1px;"></div>
            <div style="width:3px;height:11px;background:#C9A24B;border-radius:1px;"></div>
          </div>
          <span style="font-weight:700;font-size:13.5px;letter-spacing:.06em;">Bestenliste</span>
        </div>

        <!-- Gäste einladen link CTA -->
        <div style="margin-top:auto;cursor:pointer;display:inline-flex;align-items:center;gap:6px;" style-hover="opacity:.7;">
          <div style="position:relative;width:17px;height:10px;flex:none;">
            <div style="position:absolute;left:0;top:1px;width:9px;height:9px;border:1.5px solid #C9A24B;border-radius:50%;"></div>
            <div style="position:absolute;left:6px;top:1px;width:9px;height:9px;border:1.5px solid #C9A24B;border-radius:50%;"></div>
          </div>
          <span style="font-weight:700;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#6B6358;border-bottom:1.5px solid #C9A24B;padding-bottom:3px;">Gäste einladen</span>
        </div>

      </div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:840},&quot;ringMotif&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Display&quot;},&quot;showHint&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Display&quot;}}">
class Component extends DCLogic {
  state = { selected: null };
  renderVals() {
    const sel = this.state.selected;
    return {
      ringMotif: this.props.ringMotif ?? true,
      showHint: this.props.showHint ?? true,
      selVerena: sel === 'verena',
      selPhillip: sel === 'phillip',
      selectVerena: () => this.setState({ selected: 'verena' }),
      selectPhillip: () => this.setState({ selected: 'phillip' }),
    };
  }
}
</script>
</body>
</html>
