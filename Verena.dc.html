<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<template id="__bundler_thumbnail" data-bg-color="#F8E3D2">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#F8E3D2"/>
    <circle cx="600" cy="400" r="200" fill="#FAEAD9"/>
    <path d="M390 320 Q400 180 600 170 Q800 180 810 320 L810 430 Q700 360 600 360 Q500 360 390 430 Z" fill="#EFC974"/>
    <circle cx="600" cy="400" r="150" fill="#FAEAD9"/>
    <circle cx="540" cy="390" r="14" fill="#3A2E2A"/>
    <circle cx="660" cy="390" r="14" fill="#3A2E2A"/>
    <path d="M545 450 Q600 510 655 450 Z" fill="#C75B53"/>
  </svg>
</template>
<div style="position:relative;width:140px;height:178px;font-family:sans-serif">

  <!-- hair back / long blonde -->
  <div style="position:absolute;left:24px;top:2px;width:92px;height:120px;background:#EFC974;border-radius:46px 46px 34px 34px;"></div>

  <!-- left arm -->
  <div style="position:absolute;left:22px;top:84px;width:12px;height:46px;background:#F8E3D2;border-radius:6px;transform:rotate(11deg);transform-origin:top center;"></div>
  <!-- right arm -->
  <div style="position:absolute;left:106px;top:84px;width:12px;height:46px;background:#F8E3D2;border-radius:6px;transform:rotate(-11deg);transform-origin:top center;"></div>

  <!-- legs -->
  <div style="position:absolute;left:56px;top:142px;width:12px;height:28px;background:#F8E3D2;border-radius:6px;"></div>
  <div style="position:absolute;left:72px;top:142px;width:12px;height:28px;background:#F8E3D2;border-radius:6px;"></div>
  <!-- shoes -->
  <div style="position:absolute;left:52px;top:166px;width:17px;height:10px;background:#E79AA0;border-radius:8px;"></div>
  <div style="position:absolute;left:71px;top:166px;width:17px;height:10px;background:#E79AA0;border-radius:8px;"></div>

  <!-- dress -->
  <div style="position:absolute;left:26px;top:74px;width:88px;height:74px;background:#FFFFFF;clip-path:polygon(24% 0,76% 0,100% 100%,0 100%);box-shadow:0 6px 16px rgba(120,90,90,.12);"></div>
  <!-- dress sash -->
  <div style="position:absolute;left:38px;top:110px;width:64px;height:7px;background:#F4C7C2;"></div>

  <!-- head -->
  <div style="position:absolute;left:34px;top:8px;width:72px;height:72px;background:#F8E3D2;border-radius:50%;"></div>

  <!-- fringe -->
  <div style="position:absolute;left:32px;top:4px;width:76px;height:30px;background:#EFC974;border-radius:38px 38px 20px 20px;"></div>

  <!-- cheeks -->
  <div style="position:absolute;left:41px;top:53px;width:13px;height:9px;background:#F6B0AD;border-radius:50%;opacity:.85;"></div>
  <div style="position:absolute;left:86px;top:53px;width:13px;height:9px;background:#F6B0AD;border-radius:50%;opacity:.85;"></div>

  <!-- eyes -->
  <div style="position:absolute;left:54px;top:44px;width:6px;height:9px;background:#3A2E2A;border-radius:50%;"></div>
  <div style="position:absolute;left:80px;top:44px;width:6px;height:9px;background:#3A2E2A;border-radius:50%;"></div>

  <!-- big bright smile -->
  <div style="position:absolute;left:57px;top:57px;width:26px;height:16px;background:#C75B53;border-radius:4px 4px 16px 16px;overflow:hidden;">
    <div style="position:absolute;left:0;top:0;width:26px;height:6px;background:#FFFFFF;"></div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:140,&quot;height&quot;:190}}"></script>
</body>
</html>
