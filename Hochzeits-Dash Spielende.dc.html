<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<template id="__bundler_thumbnail" data-bg-color="#FBF5EA">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#FBF5EA"/>
    <text x="600" y="430" font-family="Georgia, 'DM Serif Display', serif" font-size="200" fill="#C9A24B" text-anchor="middle">225</text>
    <rect x="430" y="520" width="340" height="80" rx="20" fill="#FFFDF8" stroke="#E2D4B4" stroke-width="4"/>
  </svg>
</template>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#ECE3D4;}
  *{box-sizing:border-box;}
  .nameField::placeholder{color:#B7AC98;}
  .nameField:focus{border-color:#C9A24B !important;box-shadow:0 0 0 4px rgba(201,162,75,.18) !important;}
</style>
</helmet>

<div style="min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#F2EADB,#E6DAC6);font-family:'Karla',sans-serif;display:flex;align-items:center;justify-content:center;padding:44px 20px;">

  <div style="width:362px;height:768px;background:#1c1a16;border-radius:52px;padding:11px;box-shadow:0 36px 70px rgba(60,48,30,.30);flex:none;">
    <div style="position:relative;width:100%;height:100%;border-radius:42px;overflow:hidden;background:linear-gradient(#CFE2EA 0%,#D6D2E2 44%,#C9B6D2 78%,#B89BC0 100%);">

      <!-- notch -->
      <div style="position:absolute;left:50%;top:0;transform:translateX(-50%);width:128px;height:28px;background:#1c1a16;border-radius:0 0 18px 18px;z-index:60;"></div>

      <!-- soft warm glow -->
      <div style="position:absolute;left:50%;top:-90px;transform:translateX(-50%);width:300px;height:240px;border-radius:50%;background:radial-gradient(closest-side,rgba(247,226,160,.45),rgba(247,226,160,0));"></div>

      <!-- bunting -->
      <div style="position:absolute;left:0;top:48px;width:100%;height:30px;">
        <div style="position:absolute;left:14px;right:14px;top:2px;height:2px;background:#D8C9A8;border-radius:2px;"></div>
        <div style="position:absolute;left:14px;right:14px;top:3px;display:flex;justify-content:space-between;">
          <div style="width:18px;height:22px;background:#E8A9A2;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#D9B968;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#AFCBD6;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#E8A9A2;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#D9B968;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#AFCBD6;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#E8A9A2;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#D9B968;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
        </div>
      </div>

      <!-- confetti petals -->
      <div style="position:absolute;left:48px;top:150px;width:7px;height:7px;background:#E8A9A2;border-radius:60% 0 60% 0;transform:rotate(20deg);opacity:.6;"></div>
      <div style="position:absolute;left:296px;top:132px;width:6px;height:6px;background:#D9B968;border-radius:60% 0 60% 0;transform:rotate(-25deg);opacity:.6;"></div>
      <div style="position:absolute;left:60px;top:300px;width:6px;height:6px;background:#D9B968;border-radius:60% 0 60% 0;transform:rotate(15deg);opacity:.5;"></div>
      <div style="position:absolute;left:300px;top:320px;width:6px;height:6px;background:#E8A9A2;border-radius:60% 0 60% 0;transform:rotate(35deg);opacity:.5;"></div>
      <div style="position:absolute;left:38px;top:460px;width:5px;height:5px;background:#AFCBD6;border-radius:60% 0 60% 0;transform:rotate(10deg);opacity:.5;"></div>

      <!-- ground -->
      <div style="position:absolute;left:0;bottom:0;width:100%;height:64px;background:linear-gradient(#D8C495,#CDB67F);"></div>
      <div style="position:absolute;left:0;bottom:64px;width:100%;height:3px;background:#A9803B;opacity:.85;"></div>
      <div style="position:absolute;left:60px;bottom:40px;width:6px;height:6px;background:#E8A9A2;border-radius:60% 0 60% 0;transform:rotate(20deg);opacity:.6;"></div>
      <div style="position:absolute;left:290px;bottom:36px;width:6px;height:6px;background:#AFCBD6;border-radius:60% 0 60% 0;transform:rotate(-20deg);opacity:.55;"></div>

      <!-- content -->
      <div style="position:absolute;inset:0;padding:88px 36px 44px;display:flex;flex-direction:column;align-items:center;justify-content:center;">

        <!-- eyebrow -->
        <div style="font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#6F6480;font-weight:700;text-align:center;">Ein Hindernis ist dir zum Verhängnis geworden</div>

        <!-- score -->
        <div style="font-family:'DM Serif Display',serif;font-size:76px;line-height:1;color:#3A352F;margin:12px 0 0;text-shadow:0 4px 18px rgba(60,40,80,.18);">{{ score }}</div>

        <!-- rings collected -->
        <div style="display:flex;align-items:center;gap:7px;margin-top:14px;">
          <div style="position:relative;width:15px;height:15px;"><div style="position:absolute;inset:0;border:3px solid #C9A24B;border-radius:50%;"></div><div style="position:absolute;left:5px;top:-4px;width:5px;height:5px;background:#C9A24B;transform:rotate(45deg);"></div></div>
          <span style="font-size:14px;color:#8A6A2E;font-weight:700;white-space:nowrap;">{{ rings }} Ringe gesammelt</span>
        </div>

        <!-- divider -->
        <div style="width:58px;height:1px;background:#C9A24B;margin:26px 0 22px;"></div>

        <!-- input label -->
        <div style="font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#6F6480;font-weight:700;text-align:center;margin-bottom:12px;">Namen auf der Bestenliste eintragen</div>

        <!-- name field -->
        <input class="nameField" type="text" value="{{ name }}" onInput="{{ onName }}" placeholder="Dein Name" style="width:100%;height:54px;border-radius:16px;border:1.5px solid #E2D4B4;background:#FFFDF8;padding:0 18px;font-family:'Karla',sans-serif;font-size:17px;font-weight:600;color:#3A352F;outline:none;transition:border-color .15s,box-shadow .15s;box-shadow:0 6px 16px rgba(150,120,60,.10);" />

        <!-- helper -->
        <div style="font-size:12px;color:#6F6480;margin-top:12px;text-align:center;font-style:italic;">Nur dein bestes Ergebnis wird gespeichert</div>

        <!-- CTAs -->
        <div style="margin-top:26px;display:flex;gap:12px;width:100%;justify-content:center;">
          <div onClick="{{ onSave }}" style="cursor:pointer;height:54px;padding:0 26px;border-radius:28px;background:#C9A24B;display:flex;align-items:center;justify-content:center;color:#FFFDF8;font-weight:700;font-size:14.5px;white-space:nowrap;box-shadow:0 12px 24px rgba(201,162,75,.32);" style-hover="background:#B9923E;">{{ saveLabel }}</div>
          <a href="Hochzeits-Dash Gameplay.dc.html" style="text-decoration:none;height:54px;padding:0 26px;border-radius:28px;border:1.5px solid #C9A24B;display:flex;align-items:center;justify-content:center;color:#3A352F;font-weight:700;font-size:14.5px;white-space:nowrap;background:transparent;" style-hover="background:rgba(201,162,75,.10);">Nochmal</a>
        </div>

      </div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:840},&quot;score&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:225,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Result&quot;},&quot;rings&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Result&quot;},&quot;name&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Result&quot;}}">
class Component extends DCLogic {
  state = { name: null, saved: false };
  renderVals() {
    const name = this.state.name == null ? (this.props.name ?? '') : this.state.name;
    return {
      score: this.props.score ?? 225,
      rings: this.props.rings ?? 3,
      name,
      saveLabel: this.state.saved ? 'Gespeichert!' : 'Punkte speichern',
      onName: (e) => this.setState({ name: e.target.value }),
      onSave: () => {
        this.setState({ saved: true });
        clearTimeout(this._t);
        this._t = setTimeout(() => this.setState({ saved: false }), 1800);
      },
    };
  }
}
</script>
</body>
</html>
