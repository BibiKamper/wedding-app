<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<template id="__bundler_thumbnail" data-bg-color="#FBF5EA">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#FBF5EA"/>
    <rect x="0" y="640" width="1200" height="160" fill="#E3D4B2"/>
    <rect x="0" y="632" width="1200" height="8" fill="#C9A24B"/>
    <circle cx="600" cy="360" r="74" fill="none" stroke="#D9B968" stroke-width="22"/>
    <rect x="588" y="262" width="24" height="24" fill="#E7C977" transform="rotate(45 600 274)"/>
  </svg>
</template>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#ECE3D4;}
  *{box-sizing:border-box;}
</style>
</helmet>

<div style="min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#F2EADB,#E6DAC6);font-family:'Karla',sans-serif;display:flex;align-items:center;justify-content:center;padding:44px 20px;">

  <div style="width:362px;height:768px;background:#1c1a16;border-radius:52px;padding:11px;box-shadow:0 36px 70px rgba(60,48,30,.30);flex:none;">
    <div style="position:relative;width:100%;height:100%;border-radius:42px;overflow:hidden;background:linear-gradient(#CFE2EA 0%,#D6D2E2 44%,#C9B6D2 78%,#B89BC0 100%);">

      <!-- notch -->
      <div style="position:absolute;left:50%;top:0;transform:translateX(-50%);width:128px;height:28px;background:#1c1a16;border-radius:0 0 18px 18px;z-index:60;"></div>

      <!-- soft warm glow -->
      <div style="position:absolute;left:50%;top:-90px;transform:translateX(-50%);width:300px;height:240px;border-radius:50%;background:radial-gradient(closest-side,rgba(247,226,160,.45),rgba(247,226,160,0));"></div>

      <!-- confetti petals -->
      <div style="position:absolute;left:54px;top:150px;width:8px;height:8px;background:#E8A9A2;border-radius:60% 0 60% 0;transform:rotate(20deg);opacity:.7;"></div>
      <div style="position:absolute;left:250px;top:138px;width:7px;height:7px;background:#D9B968;border-radius:60% 0 60% 0;transform:rotate(-30deg);opacity:.7;"></div>
      <div style="position:absolute;left:300px;top:210px;width:7px;height:7px;background:#AFCBD6;border-radius:60% 0 60% 0;transform:rotate(40deg);opacity:.6;"></div>
      <div style="position:absolute;left:40px;top:250px;width:6px;height:6px;background:#D9B968;border-radius:60% 0 60% 0;transform:rotate(10deg);opacity:.55;"></div>
      <div style="position:absolute;left:170px;top:128px;width:6px;height:6px;background:#E8A9A2;border-radius:60% 0 60% 0;transform:rotate(-15deg);opacity:.6;"></div>
      <div style="position:absolute;left:290px;top:300px;width:6px;height:6px;background:#E8A9A2;border-radius:60% 0 60% 0;transform:rotate(25deg);opacity:.5;"></div>

      <!-- bunting -->
      <div style="position:absolute;left:0;top:96px;width:100%;height:30px;">
        <div style="position:absolute;left:14px;right:14px;top:2px;height:2px;background:#D8C9A8;border-radius:2px;"></div>
        <div style="position:absolute;left:14px;right:14px;top:3px;display:flex;justify-content:space-between;">
          <div style="width:18px;height:22px;background:#E8A9A2;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#D9B968;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#AFCBD6;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#E8A9A2;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#D9B968;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#AFCBD6;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#E8A9A2;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
          <div style="width:18px;height:22px;background:#D9B968;clip-path:polygon(0 0,100% 0,50% 100%);"></div>
        </div>
      </div>

      <!-- HUD: score (left) -->
      <div style="position:absolute;top:44px;left:20px;display:flex;align-items:center;gap:9px;background:rgba(255,253,248,.82);border:1px solid #E7DABA;border-radius:16px;padding:7px 13px;box-shadow:0 4px 12px rgba(150,120,60,.10);">
        <span style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#A89E8E;font-weight:700;">Punkte</span>
        <span style="font-family:'DM Serif Display',serif;font-size:19px;color:#3A352F;line-height:1;">240</span>
      </div>

      <!-- HUD: rings (right) -->
      <div style="position:absolute;top:44px;right:20px;display:flex;align-items:center;gap:8px;background:rgba(255,253,248,.82);border:1px solid #E7DABA;border-radius:16px;padding:7px 13px;box-shadow:0 4px 12px rgba(150,120,60,.10);">
        <div style="position:relative;width:17px;height:17px;"><div style="position:absolute;inset:0;border:4px solid #C9A24B;border-radius:50%;"></div><div style="position:absolute;left:5.5px;top:-5px;width:6px;height:6px;background:#C9A24B;transform:rotate(45deg);"></div></div>
        <span style="font-family:'DM Serif Display',serif;font-size:19px;color:#3A352F;line-height:1;">3</span>
      </div>

      <!-- ground -->
      <div style="position:absolute;left:0;bottom:0;width:100%;height:88px;background:linear-gradient(#D8C495,#CDB67F);"></div>
      <div style="position:absolute;left:0;bottom:88px;width:100%;height:3px;background:#A9803B;opacity:.85;"></div>
      <!-- ground petals -->
      <div style="position:absolute;left:60px;bottom:60px;width:6px;height:6px;background:#E8A9A2;border-radius:60% 0 60% 0;transform:rotate(20deg);opacity:.6;"></div>
      <div style="position:absolute;left:150px;bottom:44px;width:5px;height:5px;background:#D9B968;border-radius:60% 0 60% 0;opacity:.6;"></div>
      <div style="position:absolute;left:300px;bottom:58px;width:6px;height:6px;background:#AFCBD6;border-radius:60% 0 60% 0;transform:rotate(-20deg);opacity:.55;"></div>

      <!-- collectible ring (in the air) -->
      <div style="position:absolute;left:178px;top:392px;width:28px;height:28px;">
        <div style="position:absolute;left:-20px;top:-20px;width:68px;height:68px;border-radius:50%;background:radial-gradient(closest-side,rgba(255,230,140,.85),rgba(255,220,120,.35),rgba(255,220,120,0));"></div>
        <div style="position:absolute;left:-11px;top:-11px;width:50px;height:50px;border-radius:50%;background:radial-gradient(closest-side,rgba(255,245,200,.9),rgba(255,235,160,0));"></div>
        <div style="position:absolute;inset:0;border:5px solid #F2C94C;border-radius:50%;box-shadow:0 0 12px 2px rgba(255,205,70,.9),inset 0 0 0 1px #E0A92E;"></div>
        <div style="position:absolute;left:9px;top:-9px;width:10px;height:10px;background:#FFE17A;border:1px solid #E0A92E;transform:rotate(45deg);box-shadow:0 0 8px rgba(255,210,90,.95);"></div>
        <div style="position:absolute;left:5px;top:3px;width:6px;height:6px;background:#FFFCEB;border-radius:50%;opacity:.95;"></div>
        <div style="position:absolute;left:-13px;top:0px;width:5px;height:5px;background:#FFF3C4;border-radius:50%;opacity:.9;"></div>
        <div style="position:absolute;left:34px;top:18px;width:4px;height:4px;background:#FFF3C4;border-radius:50%;opacity:.8;"></div>
        <!-- sparkle plus -->
        <div style="position:absolute;left:-16px;top:20px;width:9px;height:9px;">
          <div style="position:absolute;left:3.5px;top:0;width:2px;height:9px;background:#FFF6D6;border-radius:1px;"></div>
          <div style="position:absolute;left:0;top:3.5px;width:9px;height:2px;background:#FFF6D6;border-radius:1px;"></div>
        </div>
      </div>

      <!-- jump-arc dots -->
      <sc-if value="{{ showArc }}" hint-placeholder-val="{{ true }}">
        <div style="position:absolute;left:108px;top:506px;width:4px;height:4px;background:#C9A24B;border-radius:50%;opacity:.4;"></div>
        <div style="position:absolute;left:130px;top:472px;width:4px;height:4px;background:#C9A24B;border-radius:50%;opacity:.45;"></div>
        <div style="position:absolute;left:152px;top:444px;width:4px;height:4px;background:#C9A24B;border-radius:50%;opacity:.5;"></div>
        <div style="position:absolute;left:176px;top:424px;width:4px;height:4px;background:#C9A24B;border-radius:50%;opacity:.55;"></div>
      </sc-if>

      <!-- gift package obstacle -->
      <div style="position:absolute;right:42px;bottom:88px;width:50px;height:54px;transform-origin:bottom center;transform:scale(.82);">
        <!-- box body -->
        <div style="position:absolute;left:4px;bottom:0;width:42px;height:34px;background:#2E9C8E;border-radius:3px;box-shadow:inset 0 -4px 0 rgba(20,80,72,.22);"></div>
        <!-- lid -->
        <div style="position:absolute;left:0;bottom:32px;width:50px;height:13px;background:#33AC9C;border-radius:4px;box-shadow:inset 0 3px 0 rgba(255,255,255,.20);"></div>
        <!-- vertical ribbon (body + lid) -->
        <div style="position:absolute;left:21px;bottom:0;width:8px;height:45px;background:#FBE7C9;"></div>
        <!-- ribbon highlight -->
        <div style="position:absolute;left:21px;bottom:0;width:3px;height:45px;background:#FFF6E2;"></div>
        <!-- bow loops -->
        <div style="position:absolute;left:9px;bottom:43px;width:15px;height:13px;background:#FBE7C9;border-radius:60% 40% 50% 60%;transform:rotate(-18deg);"></div>
        <div style="position:absolute;left:26px;bottom:43px;width:15px;height:13px;background:#FBE7C9;border-radius:40% 60% 60% 50%;transform:rotate(18deg);"></div>
        <!-- bow knot -->
        <div style="position:absolute;left:20px;bottom:44px;width:10px;height:10px;background:#EBD3A0;border-radius:50%;"></div>
      </div>

      <!-- runner (feet on the ground line) -->
      <div style="position:absolute;left:42px;bottom:88px;width:98px;height:128px;">
        <!-- contact shadow -->
        <div style="position:absolute;left:4px;bottom:-5px;width:46px;height:10px;background:radial-gradient(closest-side,rgba(90,60,20,.28),rgba(90,60,20,0));border-radius:50%;"></div>
        <!-- motion lines -->
        <div style="position:absolute;left:-14px;bottom:36px;width:16px;height:3px;background:#C9A24B;border-radius:2px;opacity:.4;"></div>
        <div style="position:absolute;left:-20px;bottom:24px;width:22px;height:3px;background:#C9A24B;border-radius:2px;opacity:.3;"></div>
        <sc-if value="{{ isVerena }}" hint-placeholder-val="{{ true }}">
          <div style="position:absolute;left:0;bottom:0;transform:scale(.42);transform-origin:bottom left;"><dc-import name="Verena" hint-size="140px,178px"></dc-import></div>
        </sc-if>
        <sc-if value="{{ isPhillip }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute;left:0;bottom:0;transform:scale(.42);transform-origin:bottom left;"><dc-import name="Phillip" hint-size="140px,180px"></dc-import></div>
        </sc-if>
      </div>

    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:840},&quot;runner&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Verena&quot;,&quot;Phillip&quot;],&quot;default&quot;:&quot;Verena&quot;,&quot;tsType&quot;:&quot;'Verena'|'Phillip'&quot;,&quot;section&quot;:&quot;Game&quot;},&quot;showArc&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Game&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const runner = this.props.runner ?? 'Verena';
    return {
      isVerena: runner === 'Verena',
      isPhillip: runner === 'Phillip',
      showArc: this.props.showArc ?? true,
    };
  }
}
</script>
</body>
</html>
