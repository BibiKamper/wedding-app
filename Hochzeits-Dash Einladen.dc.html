<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<template id="__bundler_thumbnail" data-bg-color="#FBF5EA">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#FBF5EA"/>
    <rect x="470" y="230" width="260" height="260" rx="28" fill="#FFFDF8" stroke="#C9A24B" stroke-width="6"/>
    <g fill="#3A352F">
      <rect x="500" y="260" width="60" height="60"/><rect x="640" y="260" width="60" height="60"/>
      <rect x="500" y="400" width="60" height="60"/><rect x="580" y="330" width="30" height="30"/>
      <rect x="660" y="340" width="30" height="30"/><rect x="630" y="420" width="40" height="40"/>
    </g>
    <text x="600" y="600" font-family="Georgia, 'DM Serif Display', serif" font-size="64" fill="#3A352F" text-anchor="middle">Scannen &amp; spielen</text>
  </svg>
</template>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<style>
  body{margin:0;background:#ECE3D4;}
  *{box-sizing:border-box;}
</style>
</helmet>

<div style="min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#F2EADB,#E6DAC6);font-family:'Karla',sans-serif;display:flex;align-items:center;justify-content:center;padding:44px 20px;">

  <div style="width:362px;height:768px;background:#1c1a16;border-radius:52px;padding:11px;box-shadow:0 36px 70px rgba(60,48,30,.30);flex:none;">
    <div style="position:relative;width:100%;height:100%;border-radius:42px;overflow:hidden;background:#FBF5EA;">

      <!-- notch -->
      <div style="position:absolute;left:50%;top:0;transform:translateX(-50%);width:128px;height:28px;background:#1c1a16;border-radius:0 0 18px 18px;z-index:60;"></div>

      <!-- faint corner ornaments -->
      <div style="position:absolute;left:22px;top:54px;width:34px;height:34px;border-left:1.5px solid #DBCBA6;border-top:1.5px solid #DBCBA6;border-radius:5px 0 0 0;"></div>
      <div style="position:absolute;right:22px;top:54px;width:34px;height:34px;border-right:1.5px solid #DBCBA6;border-top:1.5px solid #DBCBA6;border-radius:0 5px 0 0;"></div>
      <div style="position:absolute;left:22px;bottom:30px;width:34px;height:34px;border-left:1.5px solid #DBCBA6;border-bottom:1.5px solid #DBCBA6;border-radius:0 0 0 5px;"></div>
      <div style="position:absolute;right:22px;bottom:30px;width:34px;height:34px;border-right:1.5px solid #DBCBA6;border-bottom:1.5px solid #DBCBA6;border-radius:0 0 5px 0;"></div>

      <div style="position:absolute;inset:0;padding:74px 36px 34px;display:flex;flex-direction:column;align-items:center;">

        <!-- eyebrow -->
        <div style="font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#C9A24B;font-weight:700;">Gäste einladen</div>

        <!-- title -->
        <h1 style="font-family:'DM Serif Display',serif;font-weight:400;font-size:36px;line-height:1.1;color:#3A352F;margin:14px 0 0;text-align:center;">Scannen <span style="font-style:italic;color:#C9A24B;">&amp;</span> spielen</h1>

        <!-- rule -->
        <div style="width:58px;height:1px;background:#C9A24B;margin:16px 0 14px;"></div>

        <!-- subtitle -->
        <div style="font-style:italic;font-size:14px;color:#8C8377;text-align:center;max-width:230px;line-height:1.5;">Zeig den Code deinen Gästen — scannen und sofort mitspielen</div>

        <!-- QR card -->
        <div style="margin-top:26px;width:212px;height:212px;background:#FFFDF8;border:1.5px solid #E2D4B4;border-radius:24px;box-shadow:0 14px 30px rgba(150,120,60,.16);padding:18px;">
          <div ref="{{ qrRef }}" style="width:100%;height:100%;"></div>
        </div>

        <!-- URL (click to copy) -->
        <div onClick="{{ copyLink }}" style="margin-top:20px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;" style-hover="opacity:.72;">
          <sc-if value="{{ notCopied }}" hint-placeholder-val="{{ true }}">
            <div style="position:relative;width:15px;height:15px;flex:none;">
              <div style="position:absolute;left:3px;top:0;width:10px;height:12px;border:1.5px solid #C9A24B;border-radius:3px;"></div>
              <div style="position:absolute;left:0;top:3px;width:10px;height:12px;border:1.5px solid #C9A24B;border-radius:3px;background:#FBF5EA;"></div>
            </div>
          </sc-if>
          <sc-if value="{{ copied }}" hint-placeholder-val="{{ false }}">
            <div style="width:15px;height:12px;position:relative;flex:none;">
              <div style="position:absolute;left:0;top:6px;width:6px;height:2.5px;background:#C9A24B;border-radius:1px;transform:rotate(45deg);transform-origin:left;"></div>
              <div style="position:absolute;left:4px;top:9px;width:11px;height:2.5px;background:#C9A24B;border-radius:1px;transform:rotate(-50deg);transform-origin:left;"></div>
            </div>
          </sc-if>
          <span style="font-size:13px;letter-spacing:.02em;color:#C9A24B;font-weight:600;text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1.5px;word-break:break-all;">{{ shortUrl }}</span>
        </div>

        <!-- CTA -->
        <div style="margin-top:30px;display:flex;justify-content:center;width:100%;">
          <a href="Hochzeits-Dash Startscreen.dc.html" style="text-decoration:none;height:52px;padding:0 46px;border-radius:28px;border:1.5px solid #C9A24B;display:flex;align-items:center;justify-content:center;color:#3A352F;font-weight:700;font-size:14.5px;background:transparent;" style-hover="background:rgba(201,162,75,.10);">Startseite</a>
        </div>

      </div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:840},&quot;url&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://verena-und-phillip.netlify.app/&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Invite&quot;}}">
class Component extends DCLogic {
  state = { copied: false };

  componentDidMount() { this.renderQR(); }
  componentDidUpdate(prev) {
    if ((prev.props && prev.props.url) !== this.props.url) this.renderQR();
  }

  renderQR() {
    const url = this.props.url ?? 'https://verena-und-phillip.netlify.app/';
    const draw = () => {
      if (typeof window !== 'undefined' && window.qrcode && this.qrEl) {
        try {
          const qr = window.qrcode(0, 'M');
          qr.addData(url);
          qr.make();
          this.qrEl.innerHTML = qr.createSvgTag({ cellSize: 2, margin: 0, scalable: true });
          const svg = this.qrEl.querySelector('svg');
          if (svg) {
            svg.style.width = '100%';
            svg.style.height = '100%';
            svg.style.display = 'block';
            const path = svg.querySelector('path, rect');
            svg.querySelectorAll('path,rect').forEach(p => { if (p.getAttribute('fill') !== '#ffffff' && p.tagName.toLowerCase() === 'path') p.setAttribute('fill', '#2B2722'); });
          }
        } catch (e) { /* ignore */ }
      } else {
        setTimeout(draw, 120);
      }
    };
    draw();
  }

  renderVals() {
    const url = this.props.url ?? 'https://verena-und-phillip.netlify.app/';
    return {
      url,
      shortUrl: url.replace(/^https?:\/\//, '').replace(/\/$/, ''),
      copied: this.state.copied,
      notCopied: !this.state.copied,
      copyLabel: this.state.copied ? 'Kopiert!' : 'Link kopieren',
      qrRef: (el) => { this.qrEl = el; if (el && !el.innerHTML) this.renderQR(); },
      copyLink: () => {
        try {
          if (navigator.clipboard) navigator.clipboard.writeText(url);
        } catch (e) {}
        this.setState({ copied: true });
        clearTimeout(this._t);
        this._t = setTimeout(() => this.setState({ copied: false }), 1800);
      },
    };
  }
}
</script>
</body>
</html>
